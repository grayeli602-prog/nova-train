 weight, strict, lead with the elbow."},{n:"Rear-Delt Raise",g:"Shoulders",eq:"DBs, chest on incline bench",d:"Posterior delt \u2014 balances all the pressing and supports the rotational shoulder work skating demands."},{n:"Band Face Pull",g:"Shoulders",eq:"Band on rack",d:"External rotation + scap retraction. The single best insurance move for pressing shoulders."},{n:"Pike Push-up",g:"Shoulders",eq:"Floor",d:"BW vertical-press pattern; feeds handstand-line strength and overhead mobility together."},{n:"Weighted Pull-up",g:"Back",eq:"Rack bar + band/DB",d:"Vertical pull, lats + grip. Dead-stop reps build the bottom-range strength the muscle-up needs."},{n:"Chin-up",g:"Back",eq:"Rack bar",d:"Supinated pull \u2014 more biceps, slightly easier; good volume tool on top of pull-ups."},{n:"Barbell Row",g:"Back",eq:"Bar",d:"Horizontal pull, mid-back thickness. Hinge held ~45\xB0, pull to lower ribs; brace like an RDL."},{n:"DB Row",g:"Back",eq:"DB + bench",d:"Unilateral row \u2014 bigger range than barbell, exposes imbalances, easy on the lower back."},{n:"Band Row",g:"Back",eq:"Band on rack",d:"Constant-tension horizontal pull for high-rep pump work and warm-ups."},{n:"Straight-arm Band Pulldown",g:"Back",eq:"Band overhead",d:"Lat isolation through pure shoulder extension \u2014 teaches the lat squeeze without biceps taking over."},{n:"Scap Pull",g:"Back",eq:"Rack bar",d:"Dead hang \u2192 depress/retract shoulder blades only. The initiation strength for pull-ups and muscle-ups."},{n:"Dead Hang",g:"Back",eq:"Rack bar",d:"Decompresses the spine, opens lats/shoulders, builds grip. Already in your short days."},{n:"DB Curl",g:"Arms",eq:"DBs",d:"Biceps flexion; supinate through the rep for full recruitment."},{n:"Hammer Curl",g:"Arms",eq:"DBs",d:"Neutral grip hits brachialis + forearm \u2014 grip carryover to bar work."},{n:"Barbell Curl",g:"Arms",eq:"Bar",d:"Heaviest curl loading; strict torso, no swing."},{n:"Overhead Triceps Ext",g:"Arms",eq:"DB",d:"Long-head triceps under stretch \u2014 the head that actually adds arm size."},{n:"Skullcrusher",g:"Arms",eq:"Bar/DBs + bench",d:"Elbow extension with the long head loaded; lower to forehead or just behind."},{n:"Band Pushdown",g:"Arms",eq:"Band on rack",d:"Lateral-head pump work; constant tension, easy on elbows."},{n:"Back Squat",g:"Legs/Glutes",eq:"Rack + bar",d:"The base builder. Pain-free depth only while the knee settles; safeties set just below your bottom position."},{n:"Front Squat",g:"Legs/Glutes",eq:"Rack + bar",d:"Upright torso shifts load to quads + upper back; more knee-friendly angle for many people."},{n:"Goblet Squat",g:"Legs/Glutes",eq:"DB",d:"Self-correcting squat pattern; your go-to when the knee's cranky."},{n:"Bulgarian Split Squat",g:"Legs/Glutes",eq:"DB + bench",d:"Unilateral quad/glute driver \u2014 single-leg strength is the skating carryover."},{n:"Skater Squat",g:"Legs/Glutes",eq:"BW / DBs",d:"Single-leg knee-dominant pattern with balance demand \u2014 the closest gym analog to landing tricks."},{n:"Romanian Deadlift",g:"Legs/Glutes",eq:"Bar/DBs",d:"Hip hinge; hamstrings + glutes under stretch. Light hinge version lives in your glute block."},{n:"Single-leg RDL",g:"Legs/Glutes",eq:"DB",d:"Hinge + balance + hip stability in one \u2014 glute med works the whole time."},{n:"Deadlift",g:"Legs/Glutes",eq:"Bar",d:"Full posterior chain. Keep it submaximal per your rules \u2014 the grind rep isn't worth the recovery cost."},{n:"Hip Thrust",g:"Legs/Glutes",eq:"Bar + bench",d:"Peak glute-max tension at lockout. Squeeze 2s at top \u2014 the knee and the floor both benefit."},{n:"Glute Bridge (single-leg)",g:"Legs/Glutes",eq:"Floor / mat",d:"Floor-based glute isolation; single-leg version finds the lazy side."},{n:"Calf Raise",g:"Legs/Glutes",eq:"DBs + step",d:"Pause at the bottom stretch; ankle stiffness = pop."},{n:"Tib Raise",g:"Legs/Glutes",eq:"BW on heels / band",d:"Anterior tibialis \u2014 shin resilience for landings and ankle balance."},{n:"Lateral Band Walk",g:"Le     var refreshing = false;
    navigator.serviceWorker.addEventListener('controllerchange', function () {
      if (refreshing || !hadController) return;
      refreshing = true; window.location.reload();
    });
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('sw.js').then(function (reg) {
        reg.update(); setInterval(function () { reg.update(); }, 60 * 60 * 1000);
      }).catch(function () {});
    });
  }
</script>
